<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 ｜ 神马 Confession</title>
    <style>
        body { font-family: sans-serif; background: #e9ecef; padding: 20px; }
        h1 { text-align: center; color: #333; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card-header { display: flex; justify-content: space-between; color: #888; font-size: 14px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .card-text { font-size: 16px; color: #222; line-height: 1.6; margin-bottom: 15px; white-space: pre-wrap; }
        .card-img { max-width: 100%; border-radius: 8px; margin-top: 10px; }
        
        /* 按钮的漂亮样式 */
        .btn-group { margin-top: 15px; border-top: 1px dashed #eee; padding-top: 15px; display: flex; gap: 10px; }
        .action-btn { background: #f1f3f5; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 14px; color: #495057; font-weight: bold; transition: 0.2s; text-decoration: none; }
        .action-btn:hover { background: #e2e6ea; }
        .copy-btn { color: #0056b3; background: #cce5ff; }
        .copy-btn:hover { background: #b8daff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ 班委专属：后台审查墙</h1>
        <p style="text-align: center; color: #666;">自动提取数据，一键排版发布</p>
        <div id="wall"></div>
    </div>

    <script>
        // 一键复制文字的魔法功能
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("✅ 文字已成功复制！可以直接去粘贴了。");
            }).catch(err => {
                alert("❌ 复制失败，请手动框选复制。");
            });
        }

        async function loadMessages() {
            const wall = document.getElementById('wall');
            wall.innerHTML = '<p style="text-align:center;">数据加载中...</p>';
            
            try {
                const response = await fetch('/api/messages');
                const messages = await response.json();
                
                wall.innerHTML = ''; 
                
                if (messages.length === 0) {
                    wall.innerHTML = '<p style="text-align:center;">目前还没有人投稿哦~</p>';
                    return;
                }

                messages.forEach(msg => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // 处理旧数据的 undefined 问题，如果没有 id 就显示“旧”
                    const displayId = msg.id ? msg.id : "旧";
                    
                    const imageHtml = msg.image ? `<img src="${msg.image}" class="card-img">` : '';
                    
                    // 如果有图片，就生成下载按钮
                    const downloadBtn = msg.image ? `<a href="${msg.image}" download="神马投稿_${displayId}.jpg" class="action-btn">⬇️ 下载图片</a>` : '';
                    
                    card.innerHTML = `
                        <div class="card-header">
                            <strong>#${displayId} 号投稿</strong>
                            <span>🕒 ${msg.time}</span>
                        </div>
                        <div class="card-text">${msg.text}</div>
                        ${imageHtml}
                        <div class="btn-group">
                            <button class="action-btn copy-btn" onclick="copyText(\`${msg.text}\`)">📋 一键复制文字</button>
                            ${downloadBtn}
                        </div>
                    `;
                    wall.appendChild(card);
                });
            } catch (error) {
                wall.innerHTML = '<p style="text-align:center;color:red;">获取数据失败，请检查服务器是否开启。</p>';
            }
        }

        loadMessages();
    </script>
</body>
</html>
